<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recepção — SENAC Reservas</title>

</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="logo-wrap" id="logoWrap"><img id="logoImg" src="img/senac-logo-sem-fundo.webp" alt="SENAC"></div>
      <div class="sb-nome" id="logoTxt">SENAC · GDF</div>
      <div class="sb-sub" id="sbUnidade"></div>
      <span class="sb-badge recepcao">Recepção</span>
    </div>
    <nav class="sb-nav">
      <span class="sb-section">Painel</span>
      <button class="sb-btn" id="nav-mapa"   onclick="ir('mapa')">   <span class="ic">M</span>Mapa de Salas</button>
      <button class="sb-btn" id="nav-chaves" onclick="ir('chaves')"> <span class="ic">C</span>Chaves</button>
      <button class="sb-btn" id="nav-notifs" onclick="ir('notifs')"> <span class="ic">N</span>Notificações
        <span class="sb-notif" id="badgeNotif" style="display:none">0</span></button>
    </nav>
    <div class="sb-foot">
      <div class="sb-user"><div class="sb-avatar" id="sbIniciais">RE</div>
        <div><div class="sb-uname" id="sbNome">—</div><div class="sb-urole">Recepção</div></div></div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div><div class="tb-title" id="tbTitle">Mapa de Salas</div><div class="tb-sub" id="tbSub"></div></div>
      <div class="tb-right"><button class="btn-tema" onclick="toggleTema()"><i class="ph ph-moon"></i></button></div>
    </header>

    <!-- MAPA -->
    <div class="pg ativa" id="pg-mapa">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">Ocupação das Salas — Hoje</div>
            <div id="mapaRecLegenda" class="mapa-legenda"></div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="rdMapa()"><i class="ph ph-arrows-clockwise"></i> Atualizar</button>
        </div>
        <!-- Filtros -->
        <div class="mapa-filtros">
          <div class="mapa-busca-wrap">
            <span class="search-icon"><i class="ph ph-magnifying-glass"></i></span>
            <input type="text" id="mapaRecBusca" class="search-input" placeholder="Pesquisar sala…" oninput="rdMapa()">
          </div>
          <select id="mapaRecFiltBloco"  class="filter-select" onchange="rdMapa()" style="min-width:140px"><option value="">Todos os blocos</option></select>
          <select id="mapaRecFiltAndar"  class="filter-select" onchange="rdMapa()" style="min-width:140px"><option value="">Todos os andares</option></select>
          <select id="mapaRecFiltTurno"  class="filter-select" onchange="rdMapa()" style="min-width:130px">
            <option value="">Todos os turnos</option>
            <option>Matutino</option><option>Vespertino</option><option>Noturno</option>
          </select>
          <select id="mapaRecFiltStatus" class="filter-select" onchange="rdMapa()" style="min-width:130px">
            <option value="">Todos os status</option>
            <option value="livre"><span class="ic-dot ic-livre"></span> Livre</option>
            <option value="ocupada"><span class="ic-dot ic-ocupada"></span> Ocupada</option>
            <option value="iminente"><span class="ic-dot ic-iminente"></span> Em breve</option>
          </select>
        </div>
        <div id="mapaRec" style="margin-top:8px"></div>
      </div>
      <div class="card">
        <div class="card-title">Próximas Reservas (próximos 14 dias)</div>
        <div class="tw"><table class="tbl">
          <thead><tr><th>Sala</th><th>Turma</th><th>Instrutor</th><th>Período</th><th>Dias · Turno</th></tr></thead>
          <tbody id="tbFuturas"></tbody>
        </table></div>
      </div>
    </div>

    <!-- CHAVES -->
    <div class="pg" id="pg-chaves">
      <div class="card">
        <div class="card-head">
          <div class="card-title">Gestão de Chaves <span class="count-badge" id="countChavRec"></span></div>
          <button class="btn btn-primary" onclick="abrirChave(0)">+ Nova Chave</button>
        </div>
        <p class="txt2" style="margin-bottom:14px">Crie as chaves e controle quem as retirou.</p>
        <div id="searchChavRec"></div>
        <div id="listaChaves"></div>
      </div>
    </div>

    <!-- NOTIFS -->
    <div class="pg" id="pg-notifs">
      <div class="card"><div class="card-title">Notificações</div>
        <div id="listaNotifs"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CHAVE -->
<div class="modal-overlay" id="modalChave" style="display:none">
  <div class="modal-box">
    <div class="modal-title">
      <span id="mCTit">Nova Chave</span>
      <button class="modal-close" onclick="modalFechar('modalChave')" title="Fechar"><i class="ph ph-x"></i></button>
    </div>
    <input type="hidden" id="mCId">
    <div class="fg">
      <div class="ff"><label>Sala *</label><select id="mCSala"><option value="">— Selecione —</option></select></div>
      <div class="ff"><label>Código / Identificação *</label><input type="text" id="mCCod" placeholder="Ex.: Chave A, Lab 03-1"></div>
      <div class="ff"><label>Andar</label><input type="text" id="mCAndar" placeholder="Ex.: Térreo, 1º, 2º"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="modalFechar('modalChave')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarChave()">Salvar</button>
    </div>
  </div>
</div>

<div id="toasts"></div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/search.js"></script>
<script src="js/recepcao_page.js"></script>
</body>
</html>
