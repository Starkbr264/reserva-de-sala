<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instrutor — SENAC Reservas</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/search.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="logo-wrap" id="logoWrap"><img id="logoImg" src="img/senac-logo-sem-fundo.webp" alt="SENAC"></div>
      <div class="sb-nome" id="logoTxt">SENAC · GDF</div>
      <div class="sb-sub" id="sbUnidade"></div>
      <span class="sb-badge instrutor">Instrutor</span>
    </div>
    <nav class="sb-nav">
      <span class="sb-section">Meu Painel</span>
      <button class="sb-btn" id="nav-turmas"  onclick="ir('turmas')"> <span class="ic">T</span>Minhas Turmas</button>
      <button class="sb-btn" id="nav-salas"   onclick="ir('salas')">  <span class="ic">S</span>Solicitar Sala</button>
      <button class="sb-btn" id="nav-chaves"  onclick="ir('chaves')"> <span class="ic">C</span>Chaves</button>
      <button class="sb-btn" id="nav-notifs"  onclick="ir('notifs')"> <span class="ic">N</span>Notificações
        <span class="sb-notif" id="badgeNotif" style="display:none">0</span></button>
    </nav>
    <div class="sb-foot">
      <div class="sb-user"><div class="sb-avatar" id="sbIniciais">IN</div>
        <div><div class="sb-uname" id="sbNome">—</div><div class="sb-urole">Instrutor</div></div></div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div><div class="tb-title" id="tbTitle">Minhas Turmas</div><div class="tb-sub" id="tbSub"></div></div>
      <div class="tb-right"><button class="btn-tema" onclick="toggleTema()">◐</button></div>
    </header>

    <!-- TURMAS -->
    <div class="pg ativa" id="pg-turmas">
      <div class="card">
        <div class="card-head">
          <div class="card-title">Turmas Atribuídas a Mim <span class="count-badge" id="countTurmasInst"></span></div>
        </div>
        <div id="searchTurmasInst"></div>
        <div class="tw"><table class="tbl">
          <thead><tr><th>Código</th><th>Curso</th><th>Turno</th><th>Sala Reservada</th><th>Status</th><th>Período</th></tr></thead>
          <tbody id="tbTurmas"></tbody>
        </table></div>
      </div>
    </div>

    <!-- SOLICITAR SALA -->
    <div class="pg" id="pg-salas">
      <div class="card"><div class="card-head"><div class="card-title">Disponibilidade de Salas</div>
        <button class="btn btn-ghost btn-sm" onclick="rdSalas()">Atualizar</button></div>
        <div class="sala-map" id="listaSalas"></div>
      </div>
    </div>

    <!-- CHAVES -->
    <div class="pg" id="pg-chaves">
      <div class="card"><div class="card-title">Chaves</div>
        <p class="txt2" style="margin-bottom:14px">Sinalize ao retirar ou devolver uma chave. A recepção será notificada.</p>
        <div id="listaChaves"></div>
      </div>
    </div>

    <!-- NOTIFS -->
    <div class="pg" id="pg-notifs">
      <div class="card"><div class="card-title">Notificações</div>
        <div id="listaNotifs"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL SOLICITAÇÃO -->
<div class="modal-overlay" id="modalSolic" style="display:none">
  <div class="modal-box">
    <div class="modal-title">
      <span>Solicitar Sala: <span id="slNome"></span></span>
      <button class="modal-close" onclick="modalFechar('modalSolic')" title="Fechar">✕</button>
    </div>
    <input type="hidden" id="slSalaId">
    <div class="fg">
      <div class="ff"><label>Data *</label><input type="date" id="slData"></div>
      <div class="ff"><label>Turno *</label>
        <select id="slTurno"><option>Matutino</option><option>Vespertino</option><option>Noturno</option></select></div>
      <div class="ff"><label>Motivo / Observação</label>
        <textarea id="slMotivo" placeholder="Descreva o motivo..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="modalFechar('modalSolic')">Cancelar</button>
      <button class="btn btn-primary" onclick="enviarSolic()">Enviar Solicitação</button>
    </div>
  </div>
</div>

<div id="toasts"></div>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/search.js"></script>
<script src="js/instrutor_page.js"></script>
</body>
</html>
