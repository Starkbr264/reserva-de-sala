<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso — SENAC Reservas</title>
</head>
<body>

<div class="login-wrap">
  <div class="login-box">

    <!-- ═══════════════════════════════════════════════════
         LOGO — edite src para colocar sua imagem:
           src="logo.png"          → arquivo na mesma pasta
           src="img/logo.png"      → subpasta
           src="https://…/logo.png"→ URL externa
         Deixe src="" para exibir o texto abaixo.
         ═══════════════════════════════════════════════════ -->
    <div class="login-logo">
      <div class="logo-wrap" id="logoWrap">
        <img id="logoImg" src="img/senac-logo-sem-fundo.webp" alt="SENAC">
      </div>
      <div class="nome" id="logoTxt">SENAC · GDF</div>
      <div class="divisor"></div>
      <div class="sub">Sistema de Reserva de Salas</div>
    </div>

    <div class="lf" id="blocoUnidade">
      <label for="selUnidade">Unidade / CPS</label>
      <select id="selUnidade">
        <option value="">Selecione sua unidade...</option>
      </select>
    </div>

    <form id="fLogin" novalidate>
      <div class="lf">
        <label for="inpEmail">E-mail</label>
        <input type="text" id="inpEmail" placeholder="seu@email.com" autocomplete="username">
      </div>
      <div class="lf">
        <label for="inpSenha">Senha</label>
        <input type="password" id="inpSenha" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Entrar no Sistema</button>
    </form>

    <div id="loginMsg" class="login-msg"></div>
    <div style="text-align:center;margin-top:18px">
      <a href="index.html" style="font-size:.78rem;color:var(--text3);text-decoration:none;transition:color .15s"
         onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text3)'">
        ← Sobre o sistema
      </a>
    </div>

  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/login_page.js"></script>
</body>
</html>
